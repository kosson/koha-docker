services:
    db:
        image: ${DB_IMAGE:-mariadb:10.11}
        command: ["--sql-mode=${DB_SQL_MODE:-STRICT_TRANS_TABLES,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION}"]
        restart: always
        environment:
            MYSQL_ROOT_PASSWORD: ${KOHA_DB_ROOT_PASSWORD:-password}
            MYSQL_DATABASE: koha_${KOHA_INSTANCE:-kohadev}
            MYSQL_USER: koha_${KOHA_INSTANCE:-kohadev}
            MYSQL_PASSWORD: ${KOHA_DB_PASSWORD:-password}
        volumes:
            - koha-db-data:/var/lib/mysql
        networks:
            - kohanet
    rabbitmq:
        image: ${RABBITMQ_IMAGE:-rabbitmq:3-management}
        restart: always
        command:
            - sh
            - -lc
            - >-
              rabbitmq-plugins enable --offline rabbitmq_stomp rabbitmq_management >/dev/null &&
              exec rabbitmq-server
        environment:
            RABBITMQ_DEFAULT_USER: ${KOHA_RABBITMQ_USER:-koha}
            RABBITMQ_DEFAULT_PASS: ${KOHA_RABBITMQ_PASS:-password}
            RABBITMQ_DEFAULT_VHOST: ${KOHA_RABBITMQ_VHOST:-koha_${KOHA_INSTANCE:-kohadev}}
        volumes:
            - koha-rabbitmq-data:/var/lib/rabbitmq
        networks:
            - kohanet
    koha:
        image: ${KOHA_IMAGE_TAG:-kosson/koha-ubuntu:latest}
        pull_policy: missing
        build:
            context: .
        depends_on:
            - db
            - memcached
            - rabbitmq
        cap_add:
            - ALL
        volumes:
            - ${SYNC_REPO}:/kohadevbox/koha
            - ${OPENSEARCH_CA_CERT:-/dev/null}:/kohadevbox/opensearch-root-ca.pem:ro
        tmpfs:
            - /cover_db
            - /tmp
        env_file:
            - env/.env
        environment:
            COVERAGE: ${COVERAGE:-}
            CPAN: ${CPAN:-no}
            EXTRA_CPAN: ${EXTRA_CPAN:-}
            EXTRA_APT: ${EXTRA_APT:-}
            LOCAL_USER_ID: ${LOCAL_USER_ID}
            KOHA_CI_INCREMENTAL_RUN_REPO_URL: ${KOHA_CI_INCREMENTAL_RUN_REPO_URL:-}
            KOHA_CI_INCREMENTAL_RUNS: ${KOHA_CI_INCREMENTAL_RUNS:-}
            KOHA_CI_INCREMENTAL_RUNS_REPORT: ${KOHA_CI_INCREMENTAL_RUNS_REPORT:-}
            KOHA_CI_INCREMENTAL_RUNS_TOKEN: ${KOHA_CI_INCREMENTAL_RUNS_TOKEN:-}
            KOHA_ELASTICSEARCH: ${KOHA_ELASTICSEARCH:-no}
            ELASTIC_SERVER: ${ELASTIC_SERVER:-es:9200}
            ELASTIC_OPTIONS: ${ELASTIC_OPTIONS:-}
            OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-}
            PERL_LWP_SSL_VERIFY_HOSTNAME: ${PERL_LWP_SSL_VERIFY_HOSTNAME:-1}
            SKIP_CYPRESS_CHOWN: ${SKIP_CYPRESS_CHOWN:-no}
            SKIP_L10N: ${SKIP_L10N:-no}
            KOHA_IMAGE: ${KOHA_IMAGE:-main}
            KOHA_MARC_FLAVOUR: ${KOHA_MARC_FLAVOUR:-marc21}
            MANA_URL: ${MANA_URL}
            # Controlled by stack.sh --with-demo-data / --no-demo-data.
            # Overrides the LOAD_DEMO_DATA value from env/.env at runtime.
            LOAD_DEMO_DATA: ${LOAD_DEMO_DATA:-yes}
            # Allow stack.sh --no-fresh-db (or any caller) to tell run.sh that the
            # database is already populated, bypassing do_all_you_can_do.pl's
            # "Database is not empty!" guard.  run.sh also auto-detects this, but
            # an explicit override avoids the extra DB probe on every restart.
            USE_EXISTING_DB: ${USE_EXISTING_DB:-}
            # Root password for the MariaDB container — must match MYSQL_ROOT_PASSWORD
            # on the db service. Set in env/.env as KOHA_DB_ROOT_PASSWORD.
            KOHA_DB_ROOT_PASSWORD: ${KOHA_DB_ROOT_PASSWORD:-password}
            MESSAGE_BROKER_HOST: ${MESSAGE_BROKER_HOST:-rabbitmq}
            MESSAGE_BROKER_PORT: ${MESSAGE_BROKER_PORT:-61613}
            MESSAGE_BROKER_USER: ${KOHA_RABBITMQ_USER:-koha}
            MESSAGE_BROKER_PASS: ${KOHA_RABBITMQ_PASS:-password}
            MESSAGE_BROKER_VHOST: ${KOHA_RABBITMQ_VHOST:-koha_${KOHA_INSTANCE:-kohadev}}
            # Public-facing HTTP port for URL generation (OPACBaseURL / staffClientBaseURL).
            # Must match TRAEFIK_HTTP_PORT. Port 80 = no port suffix in browser URLs.
            KOHA_PUBLIC_PORT: ${KOHA_PUBLIC_PORT:-80}
        ulimits:
            nofile:
                soft: 65536
                hard: 65536
        labels:
            # Traefik reverse-proxy routing — requires the 'frontend' Docker network
            # and the Traefik container to be running (see traefik/docker-compose.yaml).
            #
            # The Host rules are built from env vars so they automatically match whatever
            # KOHA_INSTANCE / KOHA_DOMAIN / KOHA_INTRANET_SUFFIX are set to in env/.env.
            #
            # Port-free URLs (no :8080 / :8081 needed) once DNS — or /etc/hosts —
            # resolves the hostnames to the Docker host IP.
            # For zero-config local access set KOHA_DOMAIN=.<host-ip>.nip.io in env/.env
            # (e.g. .127.0.0.1.nip.io) — nip.io resolves those names automatically.
            - "traefik.enable=true"
            - "traefik.docker.network=frontend"
            # OPAC (public catalogue)
            - "traefik.http.routers.koha-opac.rule=Host(`${KOHA_INSTANCE}${KOHA_DOMAIN}`)"
            - "traefik.http.routers.koha-opac.entrypoints=web"
            - "traefik.http.routers.koha-opac.service=koha-opac-svc"
            - "traefik.http.services.koha-opac-svc.loadbalancer.server.port=${KOHA_OPAC_PORT:-8080}"
            # Staff interface (intranet)
            - "traefik.http.routers.koha-staff.rule=Host(`${KOHA_INSTANCE}${KOHA_INTRANET_SUFFIX}${KOHA_DOMAIN}`)"
            - "traefik.http.routers.koha-staff.entrypoints=web"
            - "traefik.http.routers.koha-staff.service=koha-staff-svc"
            - "traefik.http.services.koha-staff-svc.loadbalancer.server.port=${KOHA_INTRANET_PORT:-8081}"
            # ── HTTPS routers (websecure / :443) ──────────────────────────────
            # TLS_CERTRESOLVER controls certificate management (set in env/.env):
            #   (empty)       → Traefik self-signed fallback cert (cert warning in browser)
            #   letsencrypt   → Automatic Let's Encrypt certificate
            # Prerequisites for Let's Encrypt: ACME_EMAIL set in traefik/.env,
            # port 80 reachable from the internet, and a real public KOHA_DOMAIN.
            - "traefik.http.routers.koha-opac-tls.rule=Host(`${KOHA_INSTANCE}${KOHA_DOMAIN}`)"
            - "traefik.http.routers.koha-opac-tls.entrypoints=websecure"
            - "traefik.http.routers.koha-opac-tls.tls=true"
            - "traefik.http.routers.koha-opac-tls.tls.certresolver=${TLS_CERTRESOLVER:-}"
            - "traefik.http.routers.koha-opac-tls.service=koha-opac-svc"
            - "traefik.http.routers.koha-staff-tls.rule=Host(`${KOHA_INSTANCE}${KOHA_INTRANET_SUFFIX}${KOHA_DOMAIN}`)"
            - "traefik.http.routers.koha-staff-tls.entrypoints=websecure"
            - "traefik.http.routers.koha-staff-tls.tls=true"
            - "traefik.http.routers.koha-staff-tls.tls.certresolver=${TLS_CERTRESOLVER:-}"
            - "traefik.http.routers.koha-staff-tls.service=koha-staff-svc"
            # ── HTTP → HTTPS redirect (optional, disabled by default) ─────────
            # The middleware is always registered. Apply it by uncommenting the last
            # two lines AFTER Let's Encrypt certificates are confirmed working.
            # Enabling before valid certs are in place causes a redirect loop.
            - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
            - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"
            # - "traefik.http.routers.koha-opac.middlewares=redirect-to-https"
            # - "traefik.http.routers.koha-staff.middlewares=redirect-to-https"
        networks:
            kohanet:
                aliases:
                    - "${KOHA_INTRANET_PREFIX}${KOHA_INSTANCE}${KOHA_INTRANET_SUFFIX}${KOHA_DOMAIN}"
                    - "${KOHA_OPAC_PREFIX}${KOHA_INSTANCE}${KOHA_OPAC_SUFFIX}${KOHA_DOMAIN}"
            knonikl: {}
            opensearch-36_osearch: {}
            frontend: {}
        ports:
            # Direct host-port bindings kept as fallback.
            # With Traefik running on the 'frontend' network these are not required
            # for browser access — remove them to force all HTTP traffic through Traefik.
            - "8080:8080"
            - "8081:8081"
    memcached:
        image: ${MEMCACHED_IMAGE:-memcached}
        command: memcached -m 64m
        networks:
            - kohanet

volumes:
    koha-db-data:
    koha-rabbitmq-data:

networks:
    kohanet:
        enable_ipv4: ${ENABLE_IPV4:-true}
        enable_ipv6: ${ENABLE_IPV6:-false}
    knonikl:
        external: true
    opensearch-36_osearch:
        external: true
    frontend:
        external: true
